<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Touch of Water · MMU 2026</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #000;
      color: #fff;
      font-family: 'Courier New', monospace;
      overflow: hidden;
    }

    #map { position: fixed; inset: 0; }

    /* Darken + desaturate satellite tiles */
    .leaflet-tile-pane { filter: brightness(0.48) saturate(0.65); }
    .leaflet-control-attribution { display: none; }

    /* Header */
    #header {
      position: fixed; top: 0; left: 0; right: 0; z-index: 1000;
      padding: 1.8rem 2rem 4rem;
      background: linear-gradient(to bottom, rgba(0,0,0,0.92) 0%, transparent 100%);
      pointer-events: none;
    }
    #header h1 {
      font-size: 1.05rem; letter-spacing: 0.22em; font-weight: 400;
    }
    #header .sub {
      font-size: 0.5rem; letter-spacing: 0.22em;
      color: rgba(255,255,255,0.32); text-transform: uppercase;
      margin-top: 0.5rem; line-height: 2.2;
    }

    /* Footer */
    #footer {
      position: fixed; bottom: 0; left: 0; right: 0; z-index: 1000;
      padding: 3.5rem 2rem 1.6rem;
      background: linear-gradient(to top, rgba(0,0,0,0.88) 0%, transparent 100%);
      pointer-events: none;
    }
    #footer .credits {
      font-size: 0.45rem; letter-spacing: 0.18em;
      color: rgba(255,255,255,0.25); text-transform: uppercase; line-height: 2.4;
    }

    /* Popup */
    .leaflet-popup-content-wrapper {
      background: rgba(4,4,8,0.94) !important;
      border: 1px solid rgba(255,255,255,0.1) !important;
      border-radius: 0 !important;
      box-shadow: none !important;
      color: #fff !important;
      font-family: 'Courier New', monospace !important;
      padding: 0 !important;
    }
    .leaflet-popup-content {
      margin: 0 !important;
      padding: 1.2rem 1.5rem 1.3rem !important;
      min-width: 190px;
    }
    .leaflet-popup-tip-container { display: none; }
    .leaflet-popup-close-button {
      color: rgba(255,255,255,0.35) !important;
      top: 0.5rem !important; right: 0.6rem !important;
      font-size: 1rem !important;
    }

    .p-label  { font-size: 0.5rem; letter-spacing: 0.25em; opacity: 0.3; text-transform: uppercase; }
    .p-name   { font-size: 1rem; letter-spacing: 0.1em; margin: 0.35rem 0 0.25rem; }
    .p-gps    { font-size: 0.6rem; letter-spacing: 0.08em; opacity: 0.38; margin-bottom: 0.8rem; }
    .p-text-en     { font-size: 0.72rem; line-height: 1.65; }
    .p-text-native { font-size: 0.68rem; line-height: 1.65; opacity: 0.42; margin-top: 0.25rem; }
    .p-pending { font-size: 0.55rem; opacity: 0.28; text-transform: uppercase; letter-spacing: 0.2em; margin: 0.5rem 0; }

    .p-btn {
      display: block; margin-top: 1rem;
      padding: 0.55rem 1rem;
      border: 1px solid rgba(255,255,255,0.22);
      background: transparent; color: #fff;
      font-family: 'Courier New', monospace; font-size: 0.55rem;
      letter-spacing: 0.22em; text-transform: uppercase;
      cursor: pointer; text-align: center; text-decoration: none;
      transition: border-color 0.2s;
    }
    .p-btn:hover { border-color: rgba(255,255,255,0.6); }

    /* Dot markers */
    .dot-wrap { display: flex; align-items: center; justify-content: center; }
    .dot-inner {
      border-radius: 50%; border-style: solid;
      display: flex; align-items: center; justify-content: center;
      font-family: 'Courier New', monospace; cursor: pointer;
      transition: transform 0.15s ease;
      background: rgba(0,0,0,0.55);
    }
    .dot-inner:hover { transform: scale(1.3); }
  </style>
</head>
<body>

<div id="header">
  <h1>Touch of Water</h1>
  <div class="sub">
    Memory-Mapping with AR and Sound Journal<br>
    MMU · Cyberjaya · 24 June 2026
  </div>
</div>

<div id="map"></div>

<div id="footer">
  <div class="credits">
    AR: Bin Youn &nbsp;·&nbsp; Sound Journal: Van Luber Parensen &amp; Dyah Nindyasari (Sigisora, Jakarta)<br>
    Workshop Coordinator: Prof. Suk-Jun Kim · University of Aberdeen
  </div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
const map = L.map('map', {
  center: [2.9252, 101.6401],
  zoom: 17,
  zoomControl: false,
  attributionControl: false
})

L.tileLayer(
  'https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}',
  { maxZoom: 20 }
).addTo(map)

fetch('./teams.json')
  .then(r => r.json())
  .then(teams => {
    // Polyline connecting all 6 dots in order
    const coords = teams.map(t => [t.lat, t.lng])
    L.polyline(coords, {
      color: 'rgba(255,255,255,0.16)',
      weight: 1,
      dashArray: '3, 8'
    }).addTo(map)

    teams.forEach(team => {
      const isDemo    = team.id === 6
      const isPending = team.placeholder

      const color  = isDemo ? '#ffffff' : isPending ? 'rgba(255,255,255,0.3)' : '#6ab4ff'
      const glow   = isDemo ? 'box-shadow:0 0 10px 3px rgba(255,255,255,0.45);' : ''
      const size   = isDemo ? 20 : 15
      const label  = isDemo ? '◎' : team.id
      const border = isPending ? '1px dashed' : '1.5px solid'

      const icon = L.divIcon({
        className: 'dot-wrap',
        iconSize:   [size + 12, size + 12],
        iconAnchor: [(size + 12) / 2, (size + 12) / 2],
        html: `<div class="dot-inner" style="
          width:${size}px; height:${size}px;
          border:${border} ${color};
          color:${color};
          font-size:${Math.floor(size * 0.52)}px;
          opacity:${isPending ? 0.55 : 1};
          ${glow}
        ">${label}</div>`
      })

      let html = `<div class="p-label">${isDemo ? 'Demo' : 'Team ' + team.id}</div>`
      html    += `<div class="p-name">${team.name}</div>`

      if (team.lat && team.lng) {
        html += `<div class="p-gps">${team.lat.toFixed(5)},&nbsp;${team.lng.toFixed(5)}</div>`
      }

      if (isPending && !isDemo) {
        html += `<div class="p-pending">GPS pending</div>`
      }

      if (team.textEn)     html += `<div class="p-text-en">${team.textEn}</div>`
      if (team.textNative) html += `<div class="p-text-native">${team.textNative}</div>`

      html += `<a class="p-btn" href="ar.html?team=${team.id - 1}">Enter AR →</a>`

      L.marker([team.lat, team.lng], { icon })
        .bindPopup(html, { maxWidth: 260 })
        .addTo(map)
    })
  })
</script>
</body>
</html>
